<form class="form" name="request" novalidate="">
  <div class="form__items">
    <div class="form__item">
      <p class="form__heading _heading _h3">Заполните форму и мы свяжемся с вами, для обсуждения деталей.</p>
    </div>
    <div class="form__item">
      <label>
        <span class="form__label _sr-only">Имя*</span>
        <input class="form__input" type="text" name="name" value="" data-required="" placeholder="Имя*">
        <span class="form__error-message"></span>
      </label>
    </div>
    <div class="form__item">
      <label>
        <span class="form__label _sr-only">Телефон*</span>
        <input class="form__input" type="tel" name="phone" value="" data-required="" placeholder="Телефон*">
        <span class="form__error-message"></span>
      </label>
    </div>
    <div class="form__item">
      <label>
        <span class="form__label _sr-only">Сайт (необязательно)</span>
        <input class="form__input" type="email" name="email" value="" data-required=""
          placeholder="Сайт (необязательно)">
        <span class="form__error-message"></span>
      </label>
    </div>
    <div class="form__item">
      <label>
        <span class="form__label _sr-only">Сообщение</span>
        <textarea class="form__input" name="description" placeholder="Сообщение"></textarea>
      </label>
    </div>
    <div class="form__item form__item_small-gap">
      <div class="form__buttons-wrapper">
        <button class="form__button _btn _btn--transparent" type="submit" name="submit">Отправить</button>
        <label class="form__personal">
          <input class="form__checkbox" type="checkbox" name="agree" data-required="">
          <span class="form__label">Согласен(а) с условиями <a href="files/test.pdf" target="_blank">политики обработки
              персональных данных</a></span>
        </label>
        @@if(false){<span class="form__personal">Нажимая на кнопку, вы соглашаетесь с условиями <a href="files/test.pdf"
            target="_blank">политики обработки персональных данных</a></span>}
      </div>
    </div>
  </div>
</form>
