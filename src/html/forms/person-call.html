<form class="form" name="person-call" novalidate="">
  <div class="form__items">
    <div class="form__item">
      <label>
        <span class="form__label _sr-only">Ваш телефон</span>
        <input class="form__input" type="tel" name="phone" value="" data-required="" placeholder="Ваш телефон">
        <span class="form__error-message"></span>
      </label>
    </div>
    <div class="form__item">
      <label>
        <input class="form__checkbox" type="checkbox" name="agree" data-required="">
        <span class="form__label">Я <a href="files/test.pdf" target="_blank">согласен(а)</a> на обработку персональных данных</span>
      </label>
    </div>
    <div class="form__item">
      <div class="form__buttons-wrapper">
        <button class="form__button _btn" type="submit" name="submit">Отправить</button>
      </div>
    </div>
  </div>
</form>
