<section class="product-creation">
  <div class="container">
    <div class="product-creation__items">
      <div class="product-creation__item">
        <div class="product-creation__inner">
          <h2 class="product-creation__heading _heading">Создайте новый продукт с&nbsp;минимальными вложениями</h2>
          <div class="product-creation__list">
            <p class="product-creation__li">
              <strong>100 <span>упаковок</span></strong>
              Доступная минимальная партия от 100 упаковок позволит протестировать нишу без больших финансовых вложений.
            </p>
            <p class="product-creation__li">
              <strong>7 <span>дней</span></strong>
              Изготовим Вашу первую партию под ключ за 7 рабочих дней и отгрузим напрямую на склад маркетплейса.
            </p>
          </div>
        </div>
      </div>
      <div class="product-creation__item">
        <div class="product-creation__inner product-creation__inner_images">
          <div class="product-creation__images">
            <input type="radio" name="product-creation" id="pc-radio-01" hidden="">
            <input type="radio" name="product-creation" id="pc-radio-02" checked="" hidden="">
            <input type="radio" name="product-creation" id="pc-radio-03" hidden="">
            <label class="product-creation__iw" for="pc-radio-02">
              <img src="images/product-creation/jar-02.png" srcset="images/placeholder.png"
                data-srcset="images/product-creation/jar-02.png" alt="название бада" width="301" height="552"
                decoding="async">
            </label>
            <label class="product-creation__iw" for="pc-radio-01">
              <img src="images/product-creation/jar-01.png" srcset="images/placeholder.png"
                data-srcset="images/product-creation/jar-01.png" alt="название бада" width="138" height="215"
                decoding="async">
            </label>
            <label class="product-creation__iw" for="pc-radio-03">
              <img src="images/product-creation/jar-03.png" srcset="images/placeholder.png"
                data-srcset="images/product-creation/jar-03.png" alt="название бада" width="210" height="230"
                decoding="async">
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
