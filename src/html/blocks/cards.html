<div class="cards@@if(context.variant){ cards-0@@variant}@@if(!context.variant){ cards-01}@@if(context.reverseColors){ cards_reverse-colors} _section"
  @@if(context.id){id="@@id"}>
  <div class="container">
    @@if(context.heading){
    <h2 class="cards__heading _heading">@@heading</h2>
    }
    <div class="cards__items">
      @@loop('@@itemPath', '@@jsonPath')
    </div>
  </div>
</div>
