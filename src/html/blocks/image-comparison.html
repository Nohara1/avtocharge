<section class="image-comparison">

      <div class="image-comparison__item">
        <img-comparison-slider>
          <img slot="first" src="images/additional/comparison-01.jpg" alt="" width="502" height="335" loading="lazy" decoding="async">
          <img slot="second" src="images/additional/comparison-02.jpg" alt="" width="502" height="335" loading="lazy" decoding="async">
          <svg slot="handle" width="50" height="50">

          <svg slot="handle" width="50" height="50">
            <use href="images/icons.svg#sideways"></use>

        </img-comparison-slider>
      </div>
      <div class="image-comparison__item">

          <img slot="first" src="images/additional/comparison-01.jpg" alt="" width="502" height="335" loading="lazy" decoding="async">
          <img slot="second" src="images/additional/comparison-02.jpg" alt="" width="502" height="335" loading="lazy" decoding="async">
          <svg slot="handle" width="50" height="50">
