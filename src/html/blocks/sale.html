<section class="sale _primary-background _section-p_bdrs _r-selection">
  <div class="container">
    <div class="sale__inner">
      <h2 class="sale__title _heading">@@heading</h2>
      @@if(context.subheading){<p class="sale__text _heading _h3">@@subheading</p>}
      <button class="sale__button _btn _btn--circle-icon _btn--transparent" type="button" data-open-popup="@@button.popup">
        @@button.name<svg width="21" height="21" aria-hidden="true"><use href="images/icons.svg#arrow"></use></svg>
      </button>
    </div>
  </div>
</section>
