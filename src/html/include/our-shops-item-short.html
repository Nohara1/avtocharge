<div class="our-shops__card">
  <div class="our-shops__inner">
    <svg class="our-shops__background-icon" width="69" height="79" aria-hidden="true">
      <use href="images/icons.svg#pin"></use>
    </svg>
    <p class="our-shops__content">@@address</p>
    <p class="our-shops__content">
      График работы: <b>@@schedule</b>
    </p>
    <p class="our-shops__content">
      Телефон: <b>@@phoneElement</b>
    </p>
    @@if(false) {
    <button class="our-shops__button" type="button" value="CCUrvYwMcD" name="our-shops-set-marker">Смотреть на
      карте</button>
    }
    <a href="#our-shops-map" class="our-shops__button">Смотреть на карте</a>
  </div>
</div>
