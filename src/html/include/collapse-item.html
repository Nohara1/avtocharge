<div class="collapse__item">
  <button class="collapse__tab _title" data-toggle="@@id" type="button" aria-expanded="false" aria-controls="@@id"
    role="tab">@@title
    <svg width="15" height="15">
      <use href="images/icons.svg#plus"></use>
    </svg>
  </button>
  <div id="@@id" class="collapse__tabpanel" data-target="@@id" role="tabpanel">
    <div class="collapse__interlayer">
      <div class="collapse__content _cc">
        @@contents
      </div>
      @@if(context.link){
      <div class="collapse__link-wrapper">
        <a href="@@link" class="collapse__link _btn _btn--text">Подробнее</a>
      </div>
      }
    </div>
  </div>
</div>
