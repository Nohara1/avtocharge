<button class="sw__tab  _title" data-toggle="@@id" type="button" aria-expanded="@@if(context.aria){@@aria}@@if(!context.aria){false}" aria-controls="@@id"role="tab">
    @@title
    @@if(context.arrow){<svg width="18" height="14" aria-hidden="true">
        <use href="images/icons.svg#arrow"></use>
    </svg>}
</button>
