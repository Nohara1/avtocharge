<div class="category-card">
  <div class="category-card__inner">
    <p class="category-card__iw _iw">
      <img src="@@imageSrc" alt="@@name" srcset="images/placeholder.png" data-srcset="@@imageSrc" width="@@imageWidth"
        height="@@imageHeight" decoding="async">
    </p>
    <a href="@@url" class="category-card__link _title">
      <span>@@name
        <svg width="6" height="12">
          <use href="images/icons.svg#chevron-right"></use>
        </svg>
      </span>
    </a>
  </div>
</div>
