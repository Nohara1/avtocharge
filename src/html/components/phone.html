<a class="phone text-icon" href="tel:@@siteFormattedPhone">
  @@if(context.icon != 'hide'){<svg class="text-icon__icon" width="18" height="18">
    <use href="images/icons.svg#phone"></use>
  </svg>}<span>@@sitePhone</span>
  @@if(context.chevron){<button class="h__collapse" type="button" name="button-collapse" aria-label="Развернуть/свернуть меню">
    <svg class="h__collapse-image" width="16" height="16">
      <use href="images/icons.svg#chevron_down"></use>
    </svg>
  </button>}
</a>
