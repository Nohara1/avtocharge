<nav class="breadcrumbs crumbs">
  <div class="container">
    <div class="crumbs__list-wrapper">
      <ol class="crumbs__list" itemscope itemtype="https://schema.org/BreadcrumbList">
        @@if(context.jsonPath){
          @@loop('./src/html/components/breadcrumbs-item.html', '@@jsonPath')
        }
        @@if(context.elements){
          @@for(var i = 1; i < elements.length; i++){
            <li class="crumbs__li" itemscope itemprop="itemListElement" itemtype="https://schema.org/ListItem">
              <a class="crumbs__link" href="`+elements[i-1].link+`" itemprop="item">
                <span itemprop="name">`+elements[i-1].name+`</span>
                <meta itemprop="position" content="`+i+`">
              </a>
            </li>
          }
          @@for(var i = elements.length; i == elements.length; i++){
            <li class="crumbs__li" itemscope itemprop="itemListElement" itemtype="https://schema.org/ListItem">
              <span class="crumbs__link" itemprop="item">
                <span itemprop="name">`+elements[i-1].name+`</span>
                <meta itemprop="position" content="`+i+`">
              </span>
            </li>
          }
        }
      </ol>
    </div>
  </div>
</nav>
