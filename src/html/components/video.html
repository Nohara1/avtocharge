<div class="video@@if(context.styled){ video_styled}@@if(context.fullwidth){ video_fullwidth}">
  <div class="video__inner">
    <p class="video__cover _iw" role="button" tabindex="0" data-video-id="@@id" data-width="@@width"
      data-height="@@height" data-controls="@@if(context.controls){1}@@if(!context.controls){0}">
      <img src="https://img.youtube.com/vi/@@id/maxresdefault.jpg" alt="@@if(context.title){@@title}"
        srcset="images/placeholder.png" data-srcset="https://img.youtube.com/vi/@@id/maxresdefault.jpg" width="@@width"
        height="@@height" decoding="async">
      @@if(!context.youtubeButton){<svg class="video__play" width="60" height="60">
        <use href="images/icons.svg#play"></use>
      </svg>}
      @@if(context.youtubeButton){<svg class="video__play" width="56" height="42">
        <use href="images/icons.svg#youtube"></use>
      </svg>}
    </p>
  </div>
  @@if(context.title){<p class="video__title _title">@@title</p>}
  @@if(context.text){<div class="video__text _cc">@@text</div>}
</div>
