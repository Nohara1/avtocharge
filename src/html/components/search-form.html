<form class="search-form sf">
  <label class="sf__label" aria-label="Поиск">
    <input class="sf__input header-search" type="search" name="header-search" placeholder="Поиск...">
  </label>
  @@if(false){<button class="sf__button sf__button_close" type="button" name="header-search-button-close" aria-label="Закрыть поиск">
    <svg class="sf__button-icon" width="15" height="15">
      <use href="images/icons.svg#close"></use>
    </svg>
  </button>}
  <button class="sf__button" type="submit" name="header-search-button" aria-label="Поиск...">
    <svg class="sf__button-icon" width="15" height="15">
      <use href="images/icons.svg#search"></use>
    </svg>
  </button>
</form>
